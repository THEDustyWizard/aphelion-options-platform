version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aphelion-postgres
    environment:
      POSTGRES_DB: aphelion
      POSTGRES_USER: aphelion_user
      POSTGRES_PASSWORD: aphelion_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aphelion_user -d aphelion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aphelion-network

  redis:
    image: redis:7-alpine
    container_name: aphelion-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aphelion-network

  backend:
    build: .
    container_name: aphelion-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aphelion
      DB_USER: aphelion_user
      DB_PASSWORD: aphelion_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:3001
      WS_ENABLED: "true"
      WS_PORT: 3001
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    command: npm run dev
    networks:
      - aphelion-network

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: aphelion-timescaledb
    environment:
      POSTGRES_DB: aphelion_tsdb
      POSTGRES_USER: timescale_user
      POSTGRES_PASSWORD: timescale_password
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timescale_user -d aphelion_tsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aphelion-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: aphelion-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aphelion.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
      - timescaledb
    networks:
      - aphelion-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aphelion-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - aphelion-network

volumes:
  postgres_data:
  redis_data:
  timescaledb_data:

networks:
  aphelion-network:
    driver: bridge